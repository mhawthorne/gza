name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff linting
        run: uv run ruff check src/gza/

      - name: Run ty type checking
        run: uv run ty check src/gza/

      - name: Run mypy type checking
        run: uv run mypy src/gza/

      - name: Run custom checks
        run: uv run python -m checks

      - name: Run unit tests
        env:
          PYTEST_XDIST_WORKERS: "8"
        run: uv run pytest tests/ -n "$PYTEST_XDIST_WORKERS" --dist loadscope -x -o faulthandler_timeout=2
