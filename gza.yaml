# Gza Configuration

project_name: gza

verify_command: './bin/tests'
autonomous_verify_timeout_seconds: 300
docker_setup_command: 'uv sync'

branch_strategy: date_slug

max_steps: 100

learnings_max_items: 50

merge_squash_threshold: 1

max_review_cycles: 10

watch:
  batch: 2
  poll: 60 
  no_activity_timeout: 120
  
#provider: claude
#model: claude-sonnet-4-6
provider: codex
model: gpt-5.5

#task_types:
#  plan:
#    model: claude-opus-4-6
#  review:
#    model: claude-haiku-4-5-20251001
project_id: gza

# The gza dev repo always uses its own project-local task DB. Pin it explicitly
# so it ignores any user-level shared db_path in ~/.gza/config.yaml (its dev/test
# tasks must never be merged into a personal shared DB). Equals the built-in
# default, so it is a no-op for anyone without a global shared config.
db_path: .gza/gza.db
